{% extends "layout.html" %}
{% block title %}Profile — AIoT{% endblock %}
{% block content %}

<h2>👤 Profile</h2>

<div class="card" style="max-width:480px">
<table class="profile-table">
    <tr>
        <td>Name</td>
        <td>{{ user_name }}</td>
    </tr>
    <tr>
        <td>Email</td>
        <td>{{ user_email }}</td>
    </tr>
    <tr>
        <td>Role</td>
        <td>Caregiver</td>
    </tr>
    <tr>
        <td>System</td>
        <td>AIoT Fall Detection</td>
    </tr>
</table>
</div>

<div style="margin-top:16px">
    <a href="/logout" class="btn-logout">🚪 Logout</a>
</div>

{% endblock %}
