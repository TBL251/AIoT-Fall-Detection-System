<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register — AIoT ICU</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@100;200;300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">

    <style>
      :root {
        --accent:        #3b82f6;
        --accent-dark:   #2563eb;
        --accent-soft:   rgba(59,130,246,0.10);
        --red:           #ef4444;
        --red-soft:      rgba(239,68,68,0.08);
        --green:         #10b981;
        --green-soft:    rgba(16,185,129,0.08);
        --text:          #1e293b;
        --text-sub:      #64748b;
        --text-muted:    #94a3b8;
        --line2:         rgba(148,163,184,0.22);
        --font-display:  'Syne', sans-serif;
        --font-body:     'DM Sans', sans-serif;
        --font-mono:     'Sora', sans-serif;
        --blur:          blur(24px) saturate(1.8);
        --transition:    0.22s cubic-bezier(0.4,0,0.2,1);
        --transition-spring: 0.35s cubic-bezier(0.34,1.56,0.64,1);
      }

      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html, body {
    min-height: 100%;
    -webkit-font-smoothing: antialiased;
}

    body {
        font-family: 'Sora', sans-serif;
        background: #f0f4ff;
        display: flex;
        align-items: flex-start;
        justify-content: center;
        min-height: 100vh;
        position: relative;
        overflow-x: hidden;
        overflow-y: auto;
        padding: 24px;
    }
    .auth-box {
    margin: 40px 0;
    }

      /* Background */
      .bg-grid {
        position: fixed; inset: 0;
        background-image: radial-gradient(circle at 1px 1px, rgba(148,163,184,0.18) 1px, transparent 0);
        background-size: 36px 36px;
        z-index: 0; pointer-events: none;
      }

      .bg-mesh {
        position: fixed; inset: 0; z-index: 0; overflow: hidden;
      }

      .bg-orb {
        position: absolute; border-radius: 50%;
        filter: blur(80px);
        animation: orb-drift 12s ease-in-out infinite alternate;
      }

      .bg-orb-1 {
        width: 600px; height: 600px;
        background: radial-gradient(circle, rgba(59,130,246,0.12) 0%, transparent 70%);
        top: -200px; left: -100px;
      }

      .bg-orb-2 {
        width: 500px; height: 500px;
        background: radial-gradient(circle, rgba(16,185,129,0.09) 0%, transparent 70%);
        bottom: -150px; right: -80px;
        animation-delay: -5s;
      }

      @keyframes orb-drift {
        from { transform: translate(0,0) scale(1); }
        to   { transform: translate(25px,-25px) scale(1.05); }
      }

      /* ── Auth Box ── */
      .auth-box {
        position: relative;
        z-index: 1;
        background: rgba(255,255,255,0.86);
        backdrop-filter: var(--blur);
        -webkit-backdrop-filter: var(--blur);
        border: 1px solid rgba(255,255,255,0.95);
        border-radius: 24px;
        padding: 44px 44px 40px;
        width: 100%;
        max-width: 460px;
        box-shadow: 0 24px 80px rgba(15,23,42,0.13), 0 4px 20px rgba(15,23,42,0.06);
        animation: auth-enter 0.6s cubic-bezier(0.34,1.56,0.64,1) both;
      }

      @keyframes auth-enter {
        from { opacity: 0; transform: translateY(28px) scale(0.97); }
        to   { opacity: 1; transform: translateY(0) scale(1); }
      }

      /* ── Logo ── */
      .auth-logo {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 28px;
      }

      .auth-logo-icon {
        width: 36px; height: 36px;
        background: linear-gradient(135deg, var(--accent), var(--accent-dark));
        border-radius: 9px;
        display: flex; align-items: center; justify-content: center;
        font-size: 0.95rem;
        color: white;
        box-shadow: 0 4px 12px rgba(59,130,246,0.30);
      }

      .auth-logo-text {
        font-family: 'Sora', sans-serif;
        font-size: 1.1rem;
        font-weight: 700;
        color: var(--text);
        letter-spacing: -0.02em;
      }

      .auth-logo-text span { color: var(--accent); }

      /* Steps indicator */
      .steps-bar {
        display: flex;
        align-items: center;
        gap: 0;
        margin-bottom: 28px;
      }

      .step-item {
        display: flex;
        align-items: center;
        gap: 8px;
        font-family: 'Sora', sans-serif;
        font-size: 0.62rem;
        letter-spacing: 0.10em;
        text-transform: uppercase;
        color: var(--text-muted);
      }

      .step-num {
        width: 22px; height: 22px;
        border-radius: 50%;
        border: 1.5px solid var(--line2);
        display: flex; align-items: center; justify-content: center;
        font-size: 0.65rem;
        font-weight: 600;
        transition: all var(--transition);
      }

      .step-item.active .step-num {
        background: var(--accent);
        border-color: var(--accent);
        color: white;
        box-shadow: 0 0 12px rgba(59,130,246,0.30);
      }

      .step-item.done .step-num {
        background: var(--green);
        border-color: var(--green);
        color: white;
      }

      .step-divider {
        flex: 1;
        height: 1px;
        background: var(--line2);
        margin: 0 10px;
      }

      .auth-heading {
        font-family: 'Sora', sans-serif;
        font-size: 1.6rem;
        font-weight: 700;
        color: var(--text);
        letter-spacing: -0.03em;
        margin-bottom: 6px;
      }

      .auth-subhead {
        font-size: 0.875rem;
        color: var(--text-sub);
        margin-bottom: 26px;
      }

      /* Messages */
      #msg {
        padding: 10px 14px;
        border-radius: 8px;
        font-size: 0.8rem;
        margin-bottom: 16px;
        display: none;
      }

      .error-msg {
        background: rgba(239,68,68,0.07);
        border: 1px solid rgba(239,68,68,0.18);
        border-left: 3px solid var(--red);
        color: #dc2626;
      }

      .success-msg {
        background: rgba(16,185,129,0.07);
        border: 1px solid rgba(16,185,129,0.18);
        border-left: 3px solid var(--green);
        color: #059669;
      }

      /* ── Fields ── */
      .field { margin-bottom: 14px; }

      .field-label {
        display: block;
        font-size: 0.72rem;
        font-weight: 600;
        letter-spacing: 0.07em;
        color: var(--text-sub);
        margin-bottom: 6px;
        text-transform: uppercase;
      }

      .field-wrap { position: relative; }

      .field-icon {
        position: absolute;
        left: 14px; top: 50%;
        transform: translateY(-50%);
        font-size: 0.9rem;
        color: var(--text-muted);
        pointer-events: none;
        transition: color var(--transition);
        z-index: 1;
      }

      .field-wrap:focus-within .field-icon { color: var(--accent); }

      .field-wrap input {
        width: 100%;
        padding: 12px 16px 12px 42px;
        border: 1.5px solid rgba(148,163,184,0.28);
        border-radius: 10px;
        background: rgba(255,255,255,0.75);
        font-family: 'Sora', sans-serif;
        font-size: 0.875rem;
        color: var(--text);
        outline: none;
        transition: border-color var(--transition), box-shadow var(--transition), background var(--transition);
      }

      .field-wrap input:focus {
        border-color: var(--accent);
        background: #ffffff;
        box-shadow: 0 0 0 3px var(--accent-soft);
      }

      .field-wrap input::placeholder { color: var(--text-muted); }

      /* OTP specific */
      #otp-input {
        letter-spacing: 0.32em;
        text-align: center;
        font-family: 'Sora', sans-serif;
        font-size: 1.2rem;
        padding-left: 16px;
      }

      /* Show pw */
      .show-pw-row {
        display: flex; align-items: center; gap: 8px;
        margin: 2px 0 18px;
        font-size: 0.8rem; color: var(--text-sub);
        cursor: pointer; user-select: none;
      }

      .show-pw-row input[type="checkbox"] {
        width: 14px; height: 14px;
        accent-color: var(--accent); cursor: pointer;
      }

      /* ── Buttons ── */
      .btn-primary {
        width: 100%;
        padding: 13px;
        border: none;
        border-radius: 10px;
        background: linear-gradient(135deg, #4f8ff7 0%, var(--accent) 40%, var(--accent-dark) 100%);
        color: #fff;
        font-family: 'Sora', sans-serif;
        font-size: 0.9rem;
        font-weight: 600;
        letter-spacing: 0.02em;
        cursor: pointer;
        position: relative;
        overflow: hidden;
        transition: transform var(--transition-spring), box-shadow var(--transition);
        box-shadow: 0 6px 20px rgba(59,130,246,0.22);
        margin-bottom: 10px;
      }

      .btn-primary::before {
        content: '';
        position: absolute; inset: 0;
        background: linear-gradient(135deg, rgba(255,255,255,0.16) 0%, transparent 55%);
        pointer-events: none;
      }

      .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 12px 32px rgba(59,130,246,0.32); }
      .btn-primary:active { transform: translateY(0); }
      .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

      /* OTP Section */
      #otp-section {
        display: none;
        margin-top: 6px;
        padding-top: 18px;
        border-top: 1px solid var(--line2);
        animation: auth-enter 0.4s ease both;
      }

      .otp-hint {
        font-size: 0.8rem;
        color: var(--text-muted);
        margin-bottom: 14px;
        line-height: 1.5;
      }

      .otp-hint strong { color: var(--text-sub); }

      /* Footer */
      .auth-footer-link {
        margin-top: 20px;
        text-align: center;
        font-size: 0.83rem;
        color: var(--text-sub);
      }

      .auth-footer-link a { color: var(--accent); text-decoration: none; font-weight: 600; }
      .auth-footer-link a:hover { text-decoration: underline; }
    </style>
</head>
<body>

<div class="bg-grid"></div>
<div class="bg-mesh">
    <div class="bg-orb bg-orb-1"></div>
    <div class="bg-orb bg-orb-2"></div>
</div>

<div class="auth-box">
    <div class="auth-logo">
        <div class="auth-logo-icon">⬡</div>
        <div class="auth-logo-text">AI<span>oT</span> ICU</div>
    </div>

    <!-- Steps -->
    <div class="steps-bar">
        <div class="step-item active" id="step-1">
            <div class="step-num">1</div>
            Details
        </div>
        <div class="step-divider"></div>
        <div class="step-item" id="step-2">
            <div class="step-num">2</div>
            Verify
        </div>
    </div>

    <div class="auth-heading">Create account</div>
    <div class="auth-subhead">Register to access the monitoring system</div>

    <div id="msg"></div>

    <!-- Step 1: Info -->
    <div id="step-1-fields">
        <div class="field">
            <label class="field-label">Full Name</label>
            <div class="field-wrap">
                <input id="name" type="text" placeholder="Dr. Jane Smith">
                <span class="field-icon">👤</span>
            </div>
        </div>

        <div class="field">
            <label class="field-label">Email Address</label>
            <div class="field-wrap">
                <input id="email" type="email" placeholder="you@hospital.com">
                <span class="field-icon">✉</span>
            </div>
        </div>

        <div class="field">
            <label class="field-label">Password</label>
            <div class="field-wrap">
                <input id="password" type="password" placeholder="Min. 6 characters">
                <span class="field-icon">🔒</span>
            </div>
        </div>

        <div class="field">
            <label class="field-label">Confirm Password</label>
            <div class="field-wrap">
                <input id="confirm" type="password" placeholder="Repeat password">
                <span class="field-icon">🔒</span>
            </div>
        </div>

        <label class="show-pw-row">
            <input type="checkbox" onchange="togglePw()"> Show password
        </label>

        <button class="btn-primary" id="otp-btn" onclick="sendOTP()">Send Verification Code</button>
    </div>

    <!-- Step 2: OTP -->
    <div id="otp-section">
        <div class="otp-hint">We sent a 6-digit code to <strong id="otp-email-display">your email</strong>. Enter it below to complete registration.</div>
        <div class="field">
            <label class="field-label">Verification Code</label>
            <div class="field-wrap">
                <input id="otp" type="text" inputmode="numeric" maxlength="6" placeholder="000000">
            </div>
        </div>
        <button class="btn-primary" id="verify-btn" onclick="verify()">Verify &amp; Create Account</button>
    </div>

    <div class="auth-footer-link">
        Already have an account? <a href="/">Sign in →</a>
    </div>
</div>

<script>
function togglePw() {
    const t = document.getElementById("password").type === "password" ? "text" : "password";
    document.getElementById("password").type = t;
    document.getElementById("confirm").type  = t;
}

function showMsg(msg, isError = true) {
    const el = document.getElementById("msg");
    el.textContent = msg;
    el.style.display = "block";
    el.className = isError ? "error-msg" : "success-msg";
}

async function sendOTP() {
    const name     = document.getElementById("name").value.trim();
    const email    = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value;
    const confirm  = document.getElementById("confirm").value;
    const btn      = document.getElementById("otp-btn");

    if (!name)                return showMsg("Please enter your full name.");
    if (!email)               return showMsg("Please enter your email.");
    if (password.length < 6)  return showMsg("Password must be at least 6 characters.");
    if (password !== confirm)  return showMsg("Passwords do not match.");

    btn.disabled = true; btn.textContent = "Sending…";

    try {
        const res  = await fetch("/send-otp", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email }),
        });
        const data = await res.json();
        if (data.ok) {
            showMsg("Verification code sent! Check your inbox.", false);
            document.getElementById("otp-section").style.display = "block";
            document.getElementById("otp-email-display").textContent = email;
            document.getElementById("step-1").className = "step-item done";
            document.getElementById("step-2").className = "step-item active";
            btn.textContent = "Code Sent ✓";
        } else {
            showMsg(data.msg || "Failed to send code.");
            btn.disabled = false; btn.textContent = "Send Verification Code";
        }
    } catch {
        showMsg("Network error. Please try again.");
        btn.disabled = false; btn.textContent = "Send Verification Code";
    }
}

async function verify() {
    const email    = document.getElementById("email").value.trim();
    const name     = document.getElementById("name").value.trim();
    const password = document.getElementById("password").value;
    const otp      = document.getElementById("otp").value.trim();
    const btn      = document.getElementById("verify-btn");

    if (!otp) return showMsg("Please enter the verification code.");

    btn.disabled = true; btn.textContent = "Verifying…";

    try {
        const res  = await fetch("/verify-otp", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email, otp, name, password }),
        });
        const data = await res.json();
        if (data.ok) {
            showMsg("Account created! Redirecting to dashboard…", false);
            btn.textContent = "✓ Success";
            setTimeout(() => window.location.href = "/dashboard", 1200);
        } else {
            showMsg(data.msg || "Verification failed.");
            btn.disabled = false; btn.textContent = "Verify & Create Account";
        }
    } catch {
        showMsg("Network error. Please try again.");
        btn.disabled = false; btn.textContent = "Verify & Create Account";
    }
}

["name","email","password","confirm"].forEach(id => {
    document.getElementById(id).addEventListener("keydown", e => { if (e.key === "Enter") sendOTP(); });
});
document.getElementById("otp").addEventListener("keydown", e => { if (e.key === "Enter") verify(); });
</script>
</body>
</html>
