{% extends "layout.html" %}

{% block title %}
Replay — AIoT
{% endblock %}

{% block content %}

<h2>🔁 Replay Center</h2>

<p>
Recorded fall detection videos
</p>

<div id="video-container" class="replay-grid">

</div>

<div id="empty-box" class="empty-box">
    No recorded videos
</div>

<script>

async function loadVideos() {

    const res = await fetch("/api/replays")

    const videos = await res.json()

    const container =
        document.getElementById(
            "video-container"
        )

    const empty =
        document.getElementById(
            "empty-box"
        )

    container.innerHTML = ""

    if (videos.length === 0) {

        empty.style.display = "block"

        return
    }

    empty.style.display = "none"

    videos.forEach(video => {

        let color = "#3498db"

        if (
            video.level === "Dangerous"
        ) {
            color = "#f39c12"
        }

        if (
            video.level === "Critical Emergency"
        ) {
            color = "#e74c3c"
        }

        const card =
            document.createElement("div")

        card.className = "video-card"

        card.innerHTML = `

            <div
                class="video-level"
                style="background:${color}"
            >
                ${video.level}
            </div>

            <video controls>

                <source
                    src="${video.url}"
                    type="video/mp4"
                >

            </video>

            <div class="video-name">
                ${video.file}
            </div>

        `

        container.appendChild(card)

    })
}

loadVideos()

// realtime refresh
setInterval(
    loadVideos,
    3000
)

</script>

<style>

.replay-grid{

    display:grid;

    grid-template-columns:
        repeat(
            auto-fit,
            minmax(350px,1fr)
        );

    gap:20px;

    margin-top:20px;
}

.video-card{

    background:#111827;

    border-radius:16px;

    overflow:hidden;

    border:1px solid #1f2937;

    box-shadow:
        0 0 10px rgba(0,0,0,0.4);
}

.video-level{

    padding:10px;

    font-weight:bold;

    color:white;

    text-align:center;
}

.video-card video{

    width:100%;

    height:250px;

    object-fit:cover;

    background:black;
}

.video-name{

    padding:10px;

    color:#ddd;

    font-size:14px;

    word-break:break-all;
}

.empty-box{

    margin-top:30px;

    background:#111827;

    padding:40px;

    border-radius:16px;

    text-align:center;

    color:#888;
}

</style>

{% endblock %}
